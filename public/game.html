<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לתלות את המן 🎭</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="confetti-container" id="confetti"></div>

  <div class="container" style="justify-content: flex-start; padding-top: 16px; max-width: 960px; width: 100%;">

    <!-- Top bar -->
    <div class="game-stats" style="width: 100%; max-width: 900px;">
      <div class="stat">
        <span class="stat-value" id="correctCount">0</span>
        <span>נכון ✅</span>
      </div>
      <div class="stat">
        <div class="lives-container" id="livesContainer">
          <span class="life" id="life1">🔨</span>
          <span class="life" id="life2">🔨</span>
          <span class="life" id="life3">🔨</span>
        </div>
        <span style="font-size:0.8rem; color:rgba(59,7,100,0.55); font-weight:600;">חיים</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="wrongCount">0</span>
        <span>שגוי ❌</span>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-container" style="width: 100%; max-width: 900px;">
      <div class="progress-label" id="progressLabel">0 / 0 שאלות נכונות לניצחון</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Main game row -->
    <div style="display:flex; gap:20px; width:100%; max-width:900px; align-items:flex-start; flex-wrap:wrap; flex:1; min-height:72vh;">

      <!-- ══════ GALLOWS SVG ══════ -->
      <div class="gallows-container" style="flex: 0 0 370px;">
        <svg class="gallows-svg" viewBox="0 0 210 275" xmlns="http://www.w3.org/2000/svg">

          <!-- ── FIXED GALLOWS STRUCTURE (gp1–gp9) ── -->

          <!-- gp1: Ground shadow -->
          <ellipse id="gp1" cx="78" cy="267" rx="56" ry="7" fill="rgba(100,60,10,0.18)" opacity="0"/>

          <!-- gp2: Ground / earth -->
          <rect id="gp2" x="22" y="257" width="112" height="15" rx="5" fill="#8B6340" opacity="0"/>

          <!-- gp3: Post lower -->
          <rect id="gp3" x="48" y="158" width="17" height="101" rx="3" fill="#9c5a2e" opacity="0"/>

          <!-- gp4: Post upper -->
          <rect id="gp4" x="48" y="58" width="17" height="100" rx="3" fill="#9c5a2e" opacity="0"/>

          <!-- gp5: Post wood grain -->
          <line id="gp5" x1="53" y1="74" x2="53" y2="252" stroke="#7a4420" stroke-width="1.5" stroke-dasharray="10 5" opacity="0"/>

          <!-- gp6: Diagonal brace -->
          <polygon id="gp6" points="65,165 113,77 126,88 76,172" fill="#8B4513" opacity="0"/>

          <!-- gp7: Horizontal beam -->
          <rect id="gp7" x="48" y="54" width="124" height="19" rx="4" fill="#9c5a2e" opacity="0"/>

          <!-- gp8: Beam wood grain -->
          <line id="gp8" x1="64" y1="61" x2="164" y2="61" stroke="#7a4420" stroke-width="1.5" opacity="0"/>

          <!-- gp9: Rope anchor cap -->
          <rect id="gp9" x="161" y="54" width="13" height="19" rx="3" fill="#5c3010" opacity="0"/>

          <!-- ── FIXED PLATFORM (gp13) — rendered before hamanGroup so Haman overlaps it ── -->
          <g id="gp13" opacity="0">
            <rect x="59" y="216" width="58" height="10" rx="3" fill="#9c5a2e"/>
            <rect x="64" y="226" width="10" height="33" rx="2" fill="#7a4420"/>
            <rect x="99" y="226" width="10" height="33" rx="2" fill="#7a4420"/>
          </g>

          <!-- ══════ HAMAN GROUP — rope + body, all swing together ══════
               Pivot at (166, 73) = top of rope where it leaves the beam anchor -->
          <g id="hamanGroup">
            <animateTransform
              id="hamanSwing"
              attributeName="transform"
              type="rotate"
              values="-6 166 73; 6 166 73; -6 166 73"
              keyTimes="0; 0.5; 1"
              calcMode="spline"
              keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
              dur="2s"
              repeatCount="indefinite"
              begin="indefinite"
            />

            <!-- gp10: Rope — top straight section (starts inside hamanGroup so it swings) -->
            <line id="gp10" x1="166" y1="73" x2="166" y2="100" stroke="#b8860b" stroke-width="4" stroke-linecap="round" opacity="0"/>

            <!-- gp11: Rope — noose loop -->
            <ellipse id="gp11" cx="166" cy="106" rx="10" ry="7" fill="none" stroke="#b8860b" stroke-width="3" opacity="0"/>

            <!-- gp12: Rope — short connector below noose to neck -->
            <line id="gp12" x1="166" y1="113" x2="166" y2="120" stroke="#b8860b" stroke-width="4" stroke-linecap="round" opacity="0"/>

            <!-- ── HAMAN — head first, then crown, face, body, limbs ── -->

            <!-- gp14: Head -->
            <circle id="gp14" cx="166" cy="136" r="20" fill="#e8c49a" opacity="0"/>

            <!-- gp15: Crown base -->
            <rect id="gp15" x="147" y="114" width="38" height="12" rx="3" fill="#f59e0b" opacity="0"/>

            <!-- gp16: Crown spike — left -->
            <polygon id="gp16" points="149,114 154,97 160,114" fill="#f59e0b" opacity="0"/>

            <!-- gp17: Crown spike — center (tallest) -->
            <polygon id="gp17" points="158,114 166,90 174,114" fill="#fcd34d" opacity="0"/>

            <!-- gp18: Crown spike — right -->
            <polygon id="gp18" points="172,114 178,97 185,114" fill="#f59e0b" opacity="0"/>

            <!-- gp19: Crown jewel -->
            <ellipse id="gp19" cx="166" cy="100" rx="5" ry="6" fill="#dc2626" opacity="0"/>

            <!-- gp20: Left eye -->
            <ellipse id="gp20" cx="158" cy="131" rx="5" ry="5.5" fill="#1a0a2c" opacity="0"/>

            <!-- gp21: Right eye -->
            <ellipse id="gp21" cx="174" cy="131" rx="5" ry="5.5" fill="#1a0a2c" opacity="0"/>

            <!-- gp22: Sinister grin -->
            <path id="gp22" d="M 155 147 Q 166 158 177 147" stroke="#8B0000" stroke-width="2.5" fill="rgba(139,0,0,0.2)" stroke-linecap="round" opacity="0"/>

            <!-- gp23: Beard -->
            <path id="gp23" d="M 152 146 Q 155 162 166 165 Q 177 162 180 146" fill="#3d2b1f" opacity="0"/>

            <!-- gp24: Body torso (skin, behind robe) -->
            <rect id="gp24" x="153" y="157" width="26" height="48" rx="9" fill="#e8c49a" opacity="0"/>

            <!-- gp25: Robe -->
            <rect id="gp25" x="148" y="159" width="36" height="44" rx="9" fill="#7c3aed" opacity="0"/>

            <!-- gp26: Gold V-collar -->
            <polygon id="gp26" points="166,159 158,171 166,169 174,171" fill="#f59e0b" opacity="0"/>

            <!-- gp27: Gold belt -->
            <rect id="gp27" x="148" y="184" width="36" height="7" rx="3" fill="#f59e0b" opacity="0"/>

            <!-- gp28: Left arm -->
            <line id="gp28" x1="148" y1="171" x2="125" y2="189" stroke="#e8c49a" stroke-width="10" stroke-linecap="round" opacity="0"/>

            <!-- gp29: Right arm -->
            <line id="gp29" x1="184" y1="171" x2="205" y2="188" stroke="#e8c49a" stroke-width="10" stroke-linecap="round" opacity="0"/>

            <!-- gp30: Both legs -->
            <g id="gp30" opacity="0">
              <line x1="158" y1="202" x2="150" y2="234" stroke="#7c3aed" stroke-width="11" stroke-linecap="round"/>
              <line x1="174" y1="202" x2="182" y2="234" stroke="#7c3aed" stroke-width="11" stroke-linecap="round"/>
            </g>

          </g><!-- /hamanGroup -->
        </svg>
      </div>

      <!-- Question & Answers -->
      <div style="flex:1; min-width:300px; display:flex; flex-direction:column; gap:12px;">
        <div class="question-box" id="questionText" style="font-size:1.25rem; min-height:100px;">
          <div class="spinner"></div>
        </div>
        <div class="answers-grid" id="answersGrid">
          <button class="answer-btn" id="btnA" onclick="submitAnswer('a')"></button>
          <button class="answer-btn" id="btnB" onclick="submitAnswer('b')"></button>
          <button class="answer-btn" id="btnC" onclick="submitAnswer('c')"></button>
          <button class="answer-btn" id="btnD" onclick="submitAnswer('d')"></button>
        </div>

        <!-- Win Banner -->
        <div id="winBanner" class="hidden" style="
          background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(107,33,168,0.2));
          border: 2px solid #f59e0b;
          border-radius: 16px;
          padding: 18px 20px;
          text-align: center;
          animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
        ">
          <div style="font-size: 2rem; margin-bottom: 6px;">🎉🪢🎉</div>
          <div style="font-size: 1.25rem; font-weight: 900; color: #6b21a8; margin-bottom: 4px;" id="winBannerTitle">ניצחת!</div>
          <div style="font-size: 0.95rem; color: rgba(59,7,100,0.65); margin-bottom: 14px;">אפשר להמשיך לענות שאלות בונוס או לסיים את המשחק</div>
          <button class="btn btn-primary" onclick="goToWin()">סיים משחק 🏆</button>
        </div>
      </div>

    </div>

  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-card">
      <div style="font-size: 3rem; margin-bottom: 12px;">💀</div>
      <h2>נסו שוב!</h2>
      <p>אל תוותרו! המן עוד מחכה לתליה...</p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button class="btn btn-primary" onclick="restartGame()">נסה שוב 🔄</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">בחירת שחקן</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
